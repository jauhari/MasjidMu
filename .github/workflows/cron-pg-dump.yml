name: Cron — Daily pg_dump backup

on:
  schedule:
    # 17:13 UTC = 00:13 WIB. Off-hour to avoid the :00 stampede.
    - cron: '13 17 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Install pg_dump
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Dump Neon DB
        env:
          DATABASE_URL: ${{ secrets.NEON_PRODUCTION_URL }}
        run: |
          STAMP=$(date -u +%Y-%m-%dT%H-%M-%SZ)
          pg_dump "$DATABASE_URL" --no-owner --no-privileges --format=custom \
            -f "masjidmu-${STAMP}.dump"
          ls -lh "masjidmu-${STAMP}.dump"
          echo "DUMP_FILE=masjidmu-${STAMP}.dump" >> $GITHUB_ENV

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          aws s3 cp "$DUMP_FILE" "s3://masjidmu-backups/$DUMP_FILE" \
            --endpoint-url "$R2_ENDPOINT"
