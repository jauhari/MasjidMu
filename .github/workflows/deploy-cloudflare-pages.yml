# Deploy Vue SPA → Cloudflare Pages (+ /api proxy Functions)
#
# Secrets (repo → Settings → Secrets):
#   CLOUDFLARE_API_TOKEN   — Pages:Edit + Account:Read
#   CLOUDFLARE_ACCOUNT_ID  — Account ID dari dashboard CF
#
# Setelah project `hisabmu` dibuat (otomatis di deploy pertama), set env di
# CF Dashboard → Workers & Pages → hisabmu → Settings → Variables:
#   API_ORIGIN = https://<backend-host>   (tanpa trailing slash)

name: Deploy Cloudflare Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'frontend/**'
      - 'shared/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - '.github/workflows/deploy-cloudflare-pages.yml'
  workflow_dispatch:

concurrency:
  group: cf-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter @masjidmu/frontend build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: frontend
          command: pages deploy dist --project-name=hisabmu --branch=${{ github.ref_name }}
