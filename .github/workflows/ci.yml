name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint + Typecheck + Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
        env:
          NODE_ENV: test
          # Neon GitHub integration auto-injects DATABASE_URL for PR branches.
          # For pushes to main, use staging branch.
          DATABASE_URL: ${{ secrets.NEON_TEST_DATABASE_URL }}
          BETTER_AUTH_SECRET: ci-test-secret-must-be-at-least-32-bytes-aaaa
          BETTER_AUTH_URL: http://localhost:3000
          UPSTASH_REDIS_URL: https://placeholder.upstash.io
          UPSTASH_REDIS_TOKEN: placeholder
          R2_ACCOUNT_ID: test
          R2_ACCESS_KEY: test
          R2_SECRET_KEY: test
          R2_BUCKET: test-bucket
          RESEND_API_KEY: re_test
